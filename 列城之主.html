<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>列城之主</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=ZCOOL+XiaoWei&family=ZCOOL+QingKe+HuangYou&family=Long+Cang&display=swap" rel="stylesheet">
<link href="game.css" rel="stylesheet">
</head>
<body>
<div id="app">
  <div class="app-frame"></div>

  <!-- ═══ TITLE ═══ -->
  <div class="screen active" id="scr-title">
    <div class="t-orn"></div>
    <div class="t-seal-row"><b></b><b></b><b></b></div>
    <div class="t-main">列城<br>之主</div>
    <div class="t-sub">乱 世 攻 略 卡 牌</div>
    <div class="t-rule"></div>
    <div class="t-quote">
      <p>一座破城，三千残兵，五封战书。<span class="end-q">手起刀落之间，你将成为谁？</span></p>
    </div>
    <div class="t-relic" id="t-relic"></div>
    <div class="t-info" id="t-info"></div>
    <button class="btn primary start-btn" onclick="startGame()" style="margin-top:18px">
      <svg class="btn-icon dragon left" viewBox="0 0 24 24" aria-hidden="true"><path d="M19.8 4.4c-2.2.2-3.8.9-5.1 2.1-.8.7-1.8 1.1-3 1.1H8.8l1.3-2.4-2 .4-1.5 2.5-3.2 1 2.8 1.3-1.8 2h3.4c2 0 3.6.8 4.7 2.2.8 1.1.9 2.3.3 3.4-.4.7-1.1 1.2-2 1.5 2.8.3 5.3-1 6.4-3.3.8-1.8.5-3.8-.8-5.4.8-.2 1.5-.6 2.2-1.2 1.1-1 2.2-1.3 3.5-1.2l-2.3-4Z" fill="currentColor"/></svg>
      <span class="btn-label">接 过 兵 符</span>
      <svg class="btn-icon dragon right" viewBox="0 0 24 24" aria-hidden="true"><path d="M19.8 4.4c-2.2.2-3.8.9-5.1 2.1-.8.7-1.8 1.1-3 1.1H8.8l1.3-2.4-2 .4-1.5 2.5-3.2 1 2.8 1.3-1.8 2h3.4c2 0 3.6.8 4.7 2.2.8 1.1.9 2.3.3 3.4-.4.7-1.1 1.2-2 1.5 2.8.3 5.3-1 6.4-3.3.8-1.8.5-3.8-.8-5.4.8-.2 1.5-.6 2.2-1.2 1.1-1 2.2-1.3 3.5-1.2l-2.3-4Z" fill="currentColor"/></svg>
    </button>
    <div class="btn-row" style="margin-top:10px">
      <button class="btn" onclick="showGallery()">图 鉴</button>
      <button class="btn" onclick="confirmReset()">重 置</button>
    </div>
  </div>

  <!-- ═══ GAME ═══ -->
  <div class="screen" id="scr-game">
    <div class="statbar" id="statbar">
      <div class="stat" data-s="military" id="st-military"><div class="stat-seal">兵</div><div class="stat-num" id="rn-military">50</div><div class="stat-fill"><i id="rf-military"></i></div></div>
      <div class="stat" data-s="food" id="st-food"><div class="stat-seal">粮</div><div class="stat-num" id="rn-food">50</div><div class="stat-fill"><i id="rf-food"></i></div></div>
      <div class="stat" data-s="morale" id="st-morale"><div class="stat-seal">民</div><div class="stat-num" id="rn-morale">50</div><div class="stat-fill"><i id="rf-morale"></i></div></div>
      <div class="stat" data-s="intel" id="st-intel"><div class="stat-seal">谋</div><div class="stat-num" id="rn-intel">50</div><div class="stat-fill"><i id="rf-intel"></i></div></div>
    </div>

    <div class="canvas">
      <div class="card-area">
        <div class="card" id="card" data-ch="camp">
          <div class="card-top"></div>
          <div class="swipe-tag l" id="swipe-l"></div>
          <div class="swipe-tag r" id="swipe-r"></div>
          <div class="card-body">
            <div class="card-theme" id="card-theme"></div>
            <div class="card-main">
              <div class="card-title" id="card-title"></div>
              <div class="divider"><i></i><b></b><i></i></div>
              <div class="card-text" id="card-text"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="choices" id="choices">
        <div class="choice l" id="ch-left" onclick="choose('left')"><div class="ch-text" id="ch-left-t"></div><div class="ch-hints" id="hints-l"></div></div>
        <div class="choice r" id="ch-right" onclick="choose('right')"><div class="ch-text" id="ch-right-t"></div><div class="ch-hints" id="hints-r"></div></div>
      </div>
    </div>

    <div class="footer">
      <div class="f-left">
        <div class="month-text" id="month-text">建军第一年 · 一月</div>
        <div class="city-text" id="city-text">已攻克 0 / 5 城</div>
        <div class="log-text" id="log-text"></div>
      </div>
      <button class="seal-btn" id="seal-toggle" onclick="toggleSeal()" style="display:none">法</button>
    </div>
    <div class="seal-panel" id="seal-panel"><div class="seal-panel-t">兵 法</div><div id="seal-list"></div></div>
  </div>

  <!-- ═══ ENDING ═══ -->
  <div class="screen" id="scr-end">
    <div class="e-cat" id="e-cat"></div>
    <div class="e-title" id="e-title"></div>
    <div class="e-art" id="e-art">
      <img id="e-img" alt="">
      <div class="e-art-fallback"><span id="e-art-cat">列城之主</span></div>
    </div>
    <div class="e-desc" id="e-desc"></div>
    <div class="e-stats"><span id="e-meta"></span><span id="e-cycle"></span><span id="e-gcount"></span></div>
    <div class="e-relic" id="e-relic" style="display:none"></div>
    <div class="e-btns">
      <button class="btn primary" onclick="startGame()">再 举 旗 帜</button>
      <button class="btn" onclick="showGallery()">图 鉴</button>
    </div>
  </div>

  <!-- ═══ GALLERY ═══ -->
  <div class="screen" id="scr-gal">
    <div class="g-head"><div class="g-title">结局图鉴</div><div class="g-count" id="g-count"></div></div>
    <div class="g-tabs">
      <button class="g-tab on" data-cat="collapse" onclick="galTab(this)">覆灭</button>
      <button class="g-tab" data-cat="bond" onclick="galTab(this)">羁绊</button>
      <button class="g-tab" data-cat="path" onclick="galTab(this)">歧途</button>
      <button class="g-tab" data-cat="hidden" onclick="galTab(this)">密径</button>
    </div>
    <div class="g-scroll"><div id="g-list"></div></div>
    <div class="g-back"><button class="btn" onclick="updateTitle();showScr('scr-title')" style="margin:0 auto">返 回</button></div>
  </div>

  <!-- ═══ MODAL ═══ -->
  <div class="modal-ov" id="modal"><div class="modal-box"><div class="modal-txt">确定要重置所有数据吗？<br>所有图鉴与兵法将被清除。</div><div class="modal-btns"><button class="modal-b" onclick="hideModal()">取消</button><button class="modal-b danger" onclick="doReset()">确认重置</button></div></div></div>
</div>

<script src="engine.js"></script>
</body>
</html>
